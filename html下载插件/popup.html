<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HTML 页面下载器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; font-family: "PingFang SC","Microsoft YaHei",sans-serif;
      font-size: 13px; color: #333; background: #f7f8fa;
    }
    .container { padding: 16px; text-align: center; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .status {
      background: #fff; border-radius: 8px; padding: 10px 14px;
      margin-bottom: 12px; border: 1px solid #e8e8e8;
      font-size: 12px; color: #666;
    }
    .btn {
      display: inline-block; padding: 10px 28px; border: none;
      border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; background: #1677ff; color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #0958d9; }
    .btn:disabled { background: #91caff; cursor: not-allowed; }
    .hint { font-size: 11px; color: #bbb; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 HTML 页面下载器</h1>
    <div class="status" id="status">点击下方按钮下载当前页面源码</div>
    <button class="btn" id="downloadBtn">⬇ 下载 HTML</button>
    <div class="hint">下载当前页面的完整 DOM 源码</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
